name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Package static dist
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist
          zip -r "../clash-dashboard-${VERSION}-dist.zip" .

      - uses: softprops/action-gh-release@v2
        with:
          files: clash-dashboard-*-dist.zip
          fail_on_unmatched_files: true
